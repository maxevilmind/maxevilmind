<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Terminal profile for Max</title>
  <desc id="desc">A terminal-style developer profile describing Max's role, technology stack, operating systems, hardware and interests.</desc>

  <rect width="1200" height="540" rx="24" fill="#0d1117"/>
  <rect x="1" y="1" width="1198" height="538" rx="23" fill="none" stroke="#30363d" stroke-width="2"/>

  <circle cx="34" cy="31" r="8" fill="#ff5f56"/>
  <circle cx="60" cy="31" r="8" fill="#ffbd2e"/>
  <circle cx="86" cy="31" r="8" fill="#27c93f"/>
  <text x="600" y="37" text-anchor="middle" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">max@github: ~/profile</text>

  <line x1="0" y1="60" x2="1200" y2="60" stroke="#30363d"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="55" y="115" fill="#58a6ff" font-size="21">maxevilmind</text>
    <text x="55" y="145" fill="#8b949e" font-size="16">staff frontend engineer</text>

    <g fill="#c9d1d9" font-size="23" xml:space="preserve">
      <text x="55" y="205">███╗   ███╗ █████╗ ██╗  ██╗</text>
      <text x="55" y="238">████╗ ████║██╔══██╗╚██╗██╔╝</text>
      <text x="55" y="271">██╔████╔██║███████║ ╚███╔╝ </text>
      <text x="55" y="304">██║╚██╔╝██║██╔══██║ ██╔██╗ </text>
      <text x="55" y="337">██║ ╚═╝ ██║██║  ██║██╔╝ ██╗</text>
      <text x="55" y="370">╚═╝     ╚═╝╚═╝  ╚═╝╚═╝  ╚═╝</text>
    </g>

    <text x="55" y="430" fill="#8b949e" font-size="15">building explicit, observable and versioned systems</text>
    <text x="55" y="458" fill="#8b949e" font-size="15">— and occasionally making Linux do unreasonable things</text>

    <line x1="565" y1="92" x2="565" y2="490" stroke="#30363d"/>

    <text x="605" y="112" fill="#f0883e" font-size="19" font-weight="700">max@github</text>
    <text x="605" y="132" fill="#30363d" font-size="16">────────────────────────────────────────────────</text>

    <g font-size="16">
      <text x="605" y="168"><tspan fill="#ff7b72">Role</tspan><tspan fill="#8b949e"> ............ </tspan><tspan fill="#c9d1d9">Staff Frontend Engineer</tspan></text>
      <text x="605" y="196"><tspan fill="#ff7b72">Uptime</tspan><tspan fill="#8b949e"> .......... </tspan><tspan fill="#c9d1d9">8+ years in frontend</tspan></text>
      <text x="605" y="224"><tspan fill="#ff7b72">Location</tspan><tspan fill="#8b949e"> ........ </tspan><tspan fill="#c9d1d9">Amsterdam area, NL</tspan></text>
      <text x="605" y="252"><tspan fill="#d2a8ff">OS</tspan><tspan fill="#8b949e"> .............. </tspan><tspan fill="#c9d1d9">Rocky Linux / Ubuntu</tspan></text>
      <text x="605" y="280"><tspan fill="#d2a8ff">Frontend</tspan><tspan fill="#8b949e"> ........ </tspan><tspan fill="#c9d1d9">TypeScript, Lit, React, Vue</tspan></text>
      <text x="605" y="308"><tspan fill="#d2a8ff">Platform</tspan><tspan fill="#8b949e"> ........ </tspan><tspan fill="#c9d1d9">Microfrontends, design systems</tspan></text>
      <text x="605" y="336"><tspan fill="#79c0ff">Delivery</tspan><tspan fill="#8b949e"> ........ </tspan><tspan fill="#c9d1d9">Vite, Docker, Azure Pipelines</tspan></text>
      <text x="605" y="364"><tspan fill="#79c0ff">Homelab</tspan><tspan fill="#8b949e"> ......... </tspan><tspan fill="#c9d1d9">HA, ESP32, Raspberry Pi, OPNsense</tspan></text>
      <text x="605" y="392"><tspan fill="#56d364">Local AI</tspan><tspan fill="#8b949e"> ........ </tspan><tspan fill="#c9d1d9">llama.cpp, ComfyUI, ROCm</tspan></text>
      <text x="605" y="420"><tspan fill="#56d364">Hardware</tspan><tspan fill="#8b949e"> ........ </tspan><tspan fill="#c9d1d9">Ryzen 7 7800X3D · RX 7900 XTX</tspan></text>
      <text x="605" y="448"><tspan fill="#ffa657">Personality</tspan><tspan fill="#8b949e"> ...... </tspan><tspan fill="#c9d1d9">direct, pragmatic, skeptical</tspan></text>
      <text x="605" y="476"><tspan fill="#ffa657">Weakness</tspan><tspan fill="#8b949e"> ......... </tspan><tspan fill="#c9d1d9">cannot leave broken systems alone</tspan></text>
    </g>

    <rect x="605" y="498" width="12" height="20" fill="#58a6ff">
      <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
